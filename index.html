<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cashout & Live Odds Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
:root{
    --bg-grad-start:#f5f7fa;
    --bg-grad-end:#c3cfe2;
    --card-bg:#fff;
    --muted:#415674;
    --accent:#2874a6;
    --accent-hover:#176087;
    --input-bg:#f3f5fa;
    --result-bg:#eaf2fb;
    --text:#2d4566;
    --shadow:0 8px 32px rgba(31,38,135,.12);
}
[data-theme="dark"]{
    --bg-grad-start:#0f1724;
    --bg-grad-end:#091226;
    --card-bg:#071027;
    --muted:#9fb3c6;
    --accent:#1e90ff;
    --accent-hover:#1b7fe6;
    --input-bg:#081827;
    --result-bg:#042b40;
    --text:#d9eefc;
    --shadow:0 8px 32px rgba(0,0,0,.6);
}
html,body{
    height:100%;
    margin:0;
    font-family:Segoe UI,system-ui;
    background:linear-gradient(120deg,var(--bg-grad-start),var(--bg-grad-end));
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--text);
}
.container{
    width:100%;
    max-width:820px;
    background:var(--card-bg);
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:22px;
    display:grid;
    grid-template-columns:1fr 360px;
    gap:18px;
}
@media(max-width:860px){
    .container{grid-template-columns:1fr;}
}
h1{font-size:20px;margin:0;}
label{
    display:block;
    margin:14px 0 6px;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
}
input,select{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    border:1px solid rgba(0,0,0,.08);
    background:var(--input-bg);
    color:var(--text);
}
.row{display:flex;gap:12px;}
.half{flex:1;}
.presets{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:8px;
}
.preset-btn{
    padding:8px 10px;
    border-radius:8px;
    border:none;
    background:transparent;
    font-weight:700;
    cursor:pointer;
    color:var(--muted);
}
.preset-btn.active{
    background:rgba(40,116,166,.15);
    color:var(--accent);
}
.actions{
    margin-top:14px;
    display:flex;
    gap:10px;
}
button.primary{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:#fff;
    font-weight:800;
    cursor:pointer;
}
button.primary:hover{background:var(--accent-hover);}
button.ghost{
    padding:12px;
    border-radius:10px;
    background:transparent;
    border:1px solid rgba(0,0,0,.1);
    cursor:pointer;
}
.result-card{
    background:var(--result-bg);
    border-radius:10px;
    padding:16px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}
.result-item{font-size:16px;font-weight:700;}
.small{font-size:13px;color:var(--muted);}
.copy-btn{
    background:none;
    border:none;
    cursor:pointer;
    font-weight:700;
    color:var(--muted);
}
input[type="range"]{width:100%;}
</style>
</head>

<body>
<div class="container">
<div>
<header style="display:flex;justify-content:space-between;align-items:center;">
<h1>Cashout & Live Odds Calculator</h1>
<label class="small">
<input type="checkbox" id="themeToggle"> Dark mode
</label>
</header>

<label>Stake Amount</label>
<input id="stake" type="number" step="0.01" placeholder="700">

<label>Original Odds</label>
<input id="odds" type="number" step="0.01" placeholder="2.32">

<label>Profit Percentage (of stake)</label>
<div class="row">
<select id="profitPercent" class="half">
<option value="0.10">10%</option>
<option value="0.20">20%</option>
<option value="0.25">25%</option>
<option value="0.30">30%</option>
<option value="0.40">40%</option>
<option value="0.50" selected>50%</option>
<option value="0.75">75%</option>
<option value="1.00">100%</option>
</select>
<div class="half">
<input type="range" id="percentSlider" min="10" max="100" step="5" value="50">
</div>
</div>

<div class="presets">
<button class="preset-btn" data-p="0.10">10%</button>
<button class="preset-btn" data-p="0.20">20%</button>
<button class="preset-btn" data-p="0.25">25%</button>
<button class="preset-btn" data-p="0.30">30%</button>
<button class="preset-btn" data-p="0.40">40%</button>
<button class="preset-btn active" data-p="0.50">50%</button>
<button class="preset-btn" data-p="0.75">75%</button>
<button class="preset-btn" data-p="1.00">100%</button>
</div>

<div class="actions">
<button class="primary" id="calcBtn">Calculate</button>
<button class="ghost" id="resetBtn">Reset</button>
</div>
</div>

<aside>
<div class="result-card">
<div>
<div class="small">Result</div><br>
<div class="result-item" id="cashoutText">Cashout needed: —</div>
<div class="result-item" id="liveOddsText">Required live odds: —</div>
<div class="small" id="breakdown">Stake: — · Odds: — · Profit%: —</div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;">
<div>
<button class="copy-btn" id="copyBtn">Copy</button>
<button class="copy-btn" id="openCalcBtn">Open</button>
</div>
<div class="small" id="timeStamp"></div>
</div>
</div>
</aside>
</div>

<script>
const body=document.documentElement;
const stakeEl=document.getElementById('stake');
const oddsEl=document.getElementById('odds');
const percentSelect=document.getElementById('profitPercent');
const slider=document.getElementById('percentSlider');
const presets=document.querySelectorAll('.preset-btn');

const cashoutText=document.getElementById('cashoutText');
const liveOddsText=document.getElementById('liveOddsText');
const breakdown=document.getElementById('breakdown');
const timeStamp=document.getElementById('timeStamp');
const themeMode = document.getElementById('themeToggle')

function setPercent(p){
    percentSelect.value=p.toFixed(2);
    slider.value=p*100;
    presets.forEach(b=>b.classList.toggle('active',Number(b.dataset.p)===p));
}

function compute(stake,odds,p){
    const cashout=stake+stake*p;
    const liveOdds=(stake*odds)/cashout;
    return{cashout,liveOdds};
}

document.getElementById('calcBtn').onclick=()=>{
    const stake=+stakeEl.value;
    const odds=+oddsEl.value;
    const p=+percentSelect.value;
    if(stake<=0||odds<=1)return alert('Invalid input');
    const r=compute(stake,odds,p);
    cashoutText.textContent=`Cashout needed (${p*100}%): ${r.cashout.toFixed(2)}`;
    liveOddsText.textContent=`Required live odds: ${r.liveOdds.toFixed(3)}`;
    breakdown.textContent=`Stake: ${stake} · Odds: ${odds} · Profit: ${p*100}%`;
    timeStamp.textContent=new Date().toLocaleString();
};

document.getElementById('resetBtn').onclick=()=>{
    stakeEl.value='';
    oddsEl.value='';
    setPercent(0.5);
    cashoutText.textContent='Cashout needed: —';
    liveOddsText.textContent='Required live odds: —';
    breakdown.textContent='Stake: — · Odds: — · Profit%: —';
    timeStamp.textContent='';
};

percentSelect.onchange=()=>setPercent(+percentSelect.value);
slider.oninput=()=>setPercent(slider.value/100);
presets.forEach(b=>b.onclick=()=>setPercent(+b.dataset.p));

setPercent(0.5);
</script>
</body>
</html>
